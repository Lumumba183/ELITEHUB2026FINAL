[build]
  command = "npm install && npm run netlify-build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"

# SPA redirect — ensures React Router client-side routes work on Netlify
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
